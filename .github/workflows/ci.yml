name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ats-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ats-backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test -- --runInBand

      - name: Build
        run: npm run build

      - name: Security audit (backend)
        run: npm audit --audit-level=high

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ats-frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ats-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Setup backend dependencies for frontend tests
        run: npm ci
        working-directory: ats-backend

      - name: Generate Prisma client for frontend test harness
        run: npm run prisma:generate
        working-directory: ats-backend

      - name: Build
        run: npm run build

      - name: Run frontend tests
        run: npm run test:ci

      - name: Security audit (frontend)
        run: npm audit --audit-level=high
